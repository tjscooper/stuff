<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tim's Workshop</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f0eee8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tim's Workshop">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="description" content="Art, game dev, 3D printing, CNC, laser engraving — Tim's workshop.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ===== NAV ===== -->
  <nav class="top-nav">
    <div class="nav-brand" id="nav-home"><img src="images/hypnochip_logo.png" alt="HYPNOCHIP" class="nav-logo"></div>
    <div class="nav-links">
      <a href="#" class="nav-link active" id="nav-blog-link">// CHRONICLES</a>
      <a href="#" class="nav-link auth-only hidden" id="nav-habits-link">// MISSION LOG</a>
    </div>
    <div class="nav-actions">
      <button class="btn btn-sm auth-only hidden" id="new-post-btn">&gt; NEW ENTRY</button>
      <button class="btn btn-sm btn-outline" id="nav-login-btn">ENGAGE</button>
      <button class="btn btn-sm btn-outline auth-only hidden" id="nav-logout-btn">LOGOUT</button>
    </div>
  </nav>

  <!-- ===== AUTH MODAL ===== -->
  <div class="modal-overlay hidden" id="auth-modal">
    <div class="modal-box">
      <h2>&gt; ACCESS TERMINAL_</h2>
      <p class="modal-sub">ENTER CREDENTIALS TO PROCEED</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="auth-email" class="form-input" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="auth-password" class="form-input" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="form-error hidden" id="auth-error"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="auth-submit">Login</button>
        <button class="btn btn-ghost" id="auth-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ===== MAIN ===== -->
  <main id="main">

    <!-- BLOG VIEW -->
    <div id="view-blog" class="view active">
      <div class="category-tabs" id="category-tabs"></div>
      <div class="posts-grid" id="posts-grid">
        <div class="loading">Loading posts...</div>
      </div>
    </div>

    <!-- POST DETAIL VIEW -->
    <div id="view-post" class="view hidden">
      <div class="post-detail" id="post-detail"></div>
    </div>

    <!-- HABITS VIEW -->
    <div id="view-habits" class="view hidden">
      <div class="habits-header">
        <button class="btn btn-sm btn-ghost" id="habit-prev">← Prev</button>
        <div class="habit-date-info">
          <span id="habit-date-display"></span>
        </div>
        <button class="btn btn-sm btn-ghost" id="habit-next">Next →</button>
        <button class="btn btn-sm btn-outline" id="habit-today">Today</button>
        <button class="btn btn-sm btn-outline" id="stats-open-btn">// STATS</button>
      </div>
      <div class="habits-grid">
        <div class="habit-col" id="habit-col-chore">
          <div class="habit-col-header">
            <h3><img src="images/icons/tools.png" class="group-icon" alt=""> Chore</h3>
            <span class="habit-time-total" id="habit-time-chore"></span>
          </div>
          <div class="habit-list" id="habit-list-Chore"></div>
          <form class="habit-add-form" data-group="Chore">
            <input type="text" class="habit-add-text" placeholder="Add task..." required>
            <input type="number" class="habit-add-time" placeholder="min" min="1" max="480">
            <button type="submit" class="btn btn-sm btn-primary">Add</button>
          </form>
        </div>
        <div class="habit-col" id="habit-col-tim">
          <div class="habit-col-header">
            <h3><img src="images/icons/crown.png" class="group-icon" alt=""> Tim</h3>
            <span class="habit-time-total" id="habit-time-tim"></span>
          </div>
          <div class="habit-list" id="habit-list-Tim"></div>
          <form class="habit-add-form" data-group="Tim">
            <input type="text" class="habit-add-text" placeholder="Add task..." required>
            <input type="number" class="habit-add-time" placeholder="min" min="1" max="480">
            <button type="submit" class="btn btn-sm btn-primary">Add</button>
          </form>
        </div>
        <div class="habit-col" id="habit-col-work">
          <div class="habit-col-header">
            <h3><img src="images/icons/computer.png" class="group-icon" alt=""> Work</h3>
            <span class="habit-time-total" id="habit-time-work"></span>
          </div>
          <div class="habit-list" id="habit-list-Work"></div>
          <form class="habit-add-form" data-group="Work">
            <input type="text" class="habit-add-text" placeholder="Add task..." required>
            <input type="number" class="habit-add-time" placeholder="min" min="1" max="480">
            <button type="submit" class="btn btn-sm btn-primary">Add</button>
          </form>
        </div>
      </div>
    </div>

    <!-- POST EDITOR VIEW -->
    <div id="view-editor" class="view hidden">
      <div class="editor-container">
        <div class="editor-header">
          <h2 id="editor-title">New Post</h2>
          <div class="editor-header-actions">
            <button class="btn btn-ghost" id="editor-cancel">Cancel</button>
            <button class="btn btn-outline" id="editor-save-draft">Save Draft</button>
            <button class="btn btn-primary" id="editor-publish">Publish</button>
          </div>
        </div>
        <form id="post-form">
          <div class="form-group">
            <label>Title</label>
            <input type="text" id="post-title" class="form-input form-input-lg" placeholder="Post title..." required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Slug <span class="form-hint">(auto-generated)</span></label>
              <input type="text" id="post-slug" class="form-input" placeholder="post-slug">
            </div>
            <div class="form-group">
              <label>Category</label>
              <select id="post-category" class="form-input">
                <option value="art">Art</option>
                <option value="gamedev">Game Dev</option>
                <option value="3dprint">3D Printing</option>
                <option value="cnc">CNC</option>
                <option value="laser">Laser Engraving</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Excerpt <span class="form-hint">(short summary shown on cards)</span></label>
            <input type="text" id="post-excerpt" class="form-input" placeholder="One-line summary...">
          </div>
          <div class="form-group">
            <label>Cover Image URL</label>
            <input type="url" id="post-cover" class="form-input" placeholder="https://...">
          </div>
          <div class="form-group">
            <label>Content <span class="form-hint">(Markdown supported)</span></label>
            <textarea id="post-content" class="form-input form-textarea" placeholder="Write your post..."></textarea>
          </div>
          <div class="form-group">
            <label>Additional Image URLs <span class="form-hint">(one per line)</span></label>
            <textarea id="post-images" class="form-input form-textarea-sm" placeholder="https://image1.jpg&#10;https://image2.jpg"></textarea>
          </div>
        </form>
      </div>
    </div>

  </main>

  <!-- ===== STATS DRAWER ===== -->
  <div class="drawer-overlay hidden" id="stats-overlay"></div>
  <div class="stats-drawer hidden" id="stats-drawer">
    <div class="stats-drawer-header">
      <span class="stats-drawer-title">&gt; MISSION_STATS</span>
      <button class="btn btn-ghost" id="stats-close-btn">&times;</button>
    </div>
    <div class="stats-body" id="stats-body">
      <div class="loading">Computing stats...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://mjlmfevnmuysoilhqwiv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_PFgmOxWh25Lh5mUo0GicYg_ZBWDqkU8';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  </script>
  <script src="app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/stuff/service-worker.js')
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
